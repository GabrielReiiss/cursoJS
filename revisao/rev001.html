<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de revisão 01</title>
</head>
<body>
    
    <script>
        var nomeAnimal = window.prompt("Digite o nome do animal:");
        var pesoAnimal = parseFloat(window.prompt("Digite o peso do animal (em kg):"));

        window.alert(`O nome do animal é ${nomeAnimal.toUpperCase()} e seu peso é ${pesoAnimal.toFixed(3)} kg.`);
    </script>
</body>
</html>
