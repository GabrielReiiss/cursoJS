<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento de Estabilidade do Solo</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; }
        .painel { background: white; padding: 20px; border-radius: 10px; width: 400px; margin: 20px auto; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .alerta { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>Simulador de Estabilidade</h2>
        
        <p>Índice Inicial (0 a 100): <input type="number" id="estInicial"></p>
        <p>Dias de Monitoramento: <input type="number" id="dias" min="1"></p>
        
        <p>Tipo de Solo:
            <input type="radio" name="solo" id="arenoso" checked>
            <label for="arenoso">Arenoso</label>
            <input type="radio" name="solo" id="argiloso">
            <label for="argiloso">Argiloso</label>
        </p>
        
        <button onclick="gerarRelatorio()">Gerar Relatório</button>
        
        <div id="resultado">
            Aguardando dados...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
