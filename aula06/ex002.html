<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 02 - Curso JS</title>
    <style>
        body {
            background-color: #777777;
            color: white;
            font: oblique 18pt Verdana
        }
        h1 {
            color: black;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>

    <script>
        var nome = window.prompt('Qual é o seu nome?')
        window.alert('Prazer em te conhecer, ' + nome +'!')
        var n1 = window.prompt('Digite um número')
        var n2 = window.prompt('Digite outro número')
        window.alert('A soma de ' + n1 + ' e ' + n2 + ' é igual a ' + ((+n1) + (+n2)))
        window.alert(`A soma de ${n1} e ${n2} é igual a ${parseInt(n1) + parseInt(n2)}`)
    </script>
</body>
