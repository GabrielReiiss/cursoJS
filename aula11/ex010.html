<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10 - Curso JS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 5px;
            margin-right: 10px;
        }
        button {
            padding: 5px 10px;
        }
        #resultado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Verificador de Brasileiridade</h1>
    <p>Digite o seu país de nascimento:</p>
    <input type="text" id="pais" placeholder="Digite seu país">
    <button onclick="verificarBrasileiridade()">Verificar</button>
    <p id="resultado"></p>

    <script>
        function verificarBrasileiridade() {
            const pais = document.getElementById('pais').value.trim().toLowerCase();
            const resultado = document.getElementById('resultado');

            if (pais === 'brasil'){
                resultado.textContent = 'Você é brasileiro!';
            } else {
                resultado.textContent = 'Você não é brasileiro.';
            }
        }
    </script>
</body>
</html>
