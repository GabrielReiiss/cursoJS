<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06 - Curso JS</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        input {
            margin: 5px;
        }
        #resultado {
            margin-top: 10px;
            font-size: 1.2em;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Somando valores</h1>
    <input type="number" name="txtn1" id="txtn1">  +
    <input type="number" name="txtn2" id="txtn2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="resultado">Resultado</div>
    <script>
        function somar() {
            var n1 = Number(window.document.getElementById('txtn1').value)
            var n2 = Number(window.document.querySelector('input#txtn2').value)
            var res = window.document.getElementById('resultado')
            var total = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${total}</strong>`
        }
    </script>
</body>
</html>
